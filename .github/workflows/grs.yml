name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Stats
        run: |
          npx github-readme-stats --user rootmannwright --repo rootmannwright --theme solarized-light --output profile/stats.svg
          npx github-readme-stats --user rootmannwright --repo rootmannwright --theme solarized-light --top-langs --output profile/top-langs.svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || echo "No changes to commit"
          git push