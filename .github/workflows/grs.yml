name: Update GRS Readme Workflow

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate STATS Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${GITHUB_REPOSITORY_OWNER},show_icons=true,theme=radical
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate language card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${GITHUB_REPOSITORY_OWNER},layout=compact,theme=radical
          path: profile/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add profile/stats.svg profile/languages.svg
          git commit -m 'Update GRS Readme cards' || echo "No changes to commit"
          git push origin HEAD:main
